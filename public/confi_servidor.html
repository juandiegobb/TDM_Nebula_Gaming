<!-- config-canal.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración del Canal</title>
<link rel="stylesheet" href="./css/confi_servidor.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="contenedor">

    <!-- TÍTULO -->
    <header class="topbar">
    <a href="chat.html" class="volver">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1>CONFIGURACIÓN DEL SERVIDOR</h1>
</header>

    <!-- PANEL IZQUIERDO -->
    <section class="panel izquierda">

        <div class="foto-servidor">
            <div class="circulo">
                <button class="btn-mas">+</button>
            </div>
        </div>

        <div class="nombre-box">
            <h2>GATITOS<br>ESTRELLADOS</h2>
            <i class="fa-regular fa-pen-to-square"></i>
        </div>

        <div class="descripcion">
            <h3>DESCRIPCIÓN (OPCIONAL)</h3>

            <div class="textarea-box">
                    <textarea placeholder="¿DE QUÉ TRATA TU SERVIDOR?" maxlength="500"></textarea>
                    <span class="contador">0/500</span>
                </div>
        </div>

    </section>

    <!-- PANEL CENTRO -->
    <section class="panel centro">

        <div class="panel-header verde">
            <i class="fa-regular fa-file-lines"></i>
            <span>REGLAS</span>
        </div>

        <div class="lista-reglas">

            <div class="item">
                <div class="info">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>SE RESPETUOSO CON TODOS</span>
                </div>
                <div class="acciones">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>

            <div class="item">
                <div class="info">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>SE RESPETUOSO CON TODOS</span>
                </div>
                <div class="acciones">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>

            <div class="item">
                <div class="info">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>SE RESPETUOSO CON TODOS</span>
                </div>
                <div class="acciones">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>

        </div>

        <div class="botones">
            <button class="verde-btn">AGREGAR REGLAS</button>
            <button class="morado-btn">ACTUALIZAR</button>
        </div>

    </section>

    <!-- PANEL DERECHO -->
    <section class="panel derecha">

        <div class="panel-header morado">
            <div class="online">
                <span class="dot"></span>
                <span>25 EN LÍNEA</span>
            </div>

            <i class="fa-solid fa-play"></i>
        </div>

        <div class="usuarios">

            <div class="usuario">
                <div class="user-left">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>USER 1</span>
                </div>
                <i class="fa-solid fa-xmark"></i>
            </div>

            <div class="usuario">
                <div class="user-left">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>USER 1</span>
                </div>
                <i class="fa-solid fa-xmark"></i>
            </div>

            <div class="usuario">
                <div class="user-left">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>USER 1</span>
                </div>
                <i class="fa-solid fa-xmark"></i>
            </div>

            <div class="usuario">
                <div class="user-left">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>USER 1</span>
                </div>
                <i class="fa-solid fa-xmark"></i>
            </div>

            <div class="usuario">
                <div class="user-left">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>USER 1</span>
                </div>
                <i class="fa-solid fa-xmark"></i>
            </div>

        </div>

        <div class="botones">
            <button class="verde-btn">AGREGAR MIEMBROS</button>
            <button class="morado-btn">ACTUALIZAR</button>
        </div>

    </section>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Miembros</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/menu.css">

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="miembros">

    <!-- HEADER -->
    <div class="miembros-header">
      <div class="title">
        <i class="fa-solid fa-users"></i>
        <span>MIEMBROS</span>
      </div>
      <button class="close">✖</button>
    </div>

    <!-- BODY -->
    <div class="miembros-body">

      <!-- ADMIN -->
      <div class="user">
        <div class="avatar">
          <span class="status online"></span>
        </div>
        <div class="info">
          <span class="name">
            USER 1
            <span class="badge admin">ADMIN</span>
          </span>
        </div>
      </div>

      <!-- USER ONLINE -->
      <div class="user">
        <div class="avatar">
          <span class="status online"></span>
        </div>
        <div class="info">
          <span class="name">USER 1</span>
        </div>
      </div>

      <!-- USER OFFLINE -->
      <div class="user">
        <div class="avatar">
          <span class="status offline"></span>
        </div>
        <div class="info">
          <span class="name">USER 1</span>
          <span class="desc">DESCONECTADO</span>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
